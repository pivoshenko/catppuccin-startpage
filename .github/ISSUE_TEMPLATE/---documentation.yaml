name: Documentation Issue
labels: ["type: documentation"]
description: Report errors, gaps, or unclear sections in the documentation

body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve the documentation.
        Share enough detail so maintainers can quickly identify and fix the issue.

  - type: dropdown
    attributes:
      label: Issue Type
      description: |
        What kind of documentation issue is this?
      options:
        - Missing documentation
        - Incorrect documentation
        - Unclear explanation
        - Outdated content
        - Formatting or broken link
        - Other
    validations:
      required: true

  - type: input
    attributes:
      label: Documentation Location
      description: |
        Provide a link or path to the affected documentation, if available.
      placeholder: "https://... or docs/path/file.md"
    validations:
      required: false

  - type: textarea
    attributes:
      label: Current Content
      description: |
        Quote or summarize the current content that is problematic.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Suggested Improvement
      description: |
        Describe what should be changed or added.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional Context
      description: |
        Add screenshots, references, or related links.
    validations:
      required: false
