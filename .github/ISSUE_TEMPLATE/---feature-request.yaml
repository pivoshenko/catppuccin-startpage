name: Feature Request
labels: ["type: enhancement"]
description: Suggest an idea or improvement for this project

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement.
        Please describe the problem and the proposed solution with enough detail for maintainers to evaluate.

  - type: dropdown
    attributes:
      label: Feature Type
      description: |
        What best describes this request?
      options:
        - New capability
        - Improvement to existing behavior
        - User experience improvement
        - Performance improvement
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Problem Statement
      description: |
        What problem are you trying to solve?
        Describe the current pain point or limitation.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: |
        Describe the solution you would like to see.
        Include examples, API shapes, or UX notes when relevant.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives Considered
      description: |
        Describe alternative solutions or workarounds you considered.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Impact
      description: |
        Who benefits from this change and how?
        Include expected impact on usability, performance, or maintainability.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: |
        Add mockups, references, related issues, or any extra context.
    validations:
      required: false
