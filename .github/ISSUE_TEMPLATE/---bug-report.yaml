name: Bug Report
labels: ["type: bug"]
description: Create a report to help us identify and fix a problem

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report.
        Please provide as much detail as possible so maintainers can reproduce and fix the issue quickly.

  - type: textarea
    attributes:
      label: Description
      description: |
        Describe what happened and what you expected to happen.
        Include screenshots or recordings if they help explain the issue.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: |
        Provide clear, minimal steps that reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Current Behavior
      description: |
        What result do you currently see?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: |
        What result did you expect to see instead?
    validations:
      required: true

  - type: input
    attributes:
      label: Environment
      description: |
        Provide relevant environment details (for example: OS, browser/runtime, language/framework versions).
      placeholder: "Ubuntu 24.04, Node.js 22.x, Chrome 124"
    validations:
      required: false

  - type: textarea
    attributes:
      label: Logs and Error Output
      description: |
        Paste relevant logs, stack traces, or error output.
      render: shell
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: |
        Add any other context, links, or related issues.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Possible Workaround
      description: |
        If you found a temporary workaround, share it here.
    validations:
      required: false
